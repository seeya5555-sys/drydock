<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Dry Dock Manager — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0f2744;
      --blue: #1d6fdb;
      --blue-light: #eff6ff;
      --green: #10b981;
      --red: #ef4444;
      --border: #e2e8f0;
      --bg: #f1f5f9;
      --white: #ffffff;
      --txt-h: #0f172a;
      --txt-s: #475569;
      --txt-m: #94a3b8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f2744 0%, #1d3a6b 50%, #0f2744 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .login-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .5px;
    }
    .login-logo p {
      font-size: 13px;
      color: rgba(255,255,255,.5);
      margin-top: 4px;
    }
    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .login-card h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--txt-h);
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--txt-s);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--txt-h);
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus {
      border-color: var(--blue);
    }
    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .login-btn:hover { background: #1558b0; }
    .login-btn:disabled { background: var(--txt-m); cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer-txt {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,.4);
    }
    .footer-contact {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,.28);
      line-height: 1.7;
    }
    .footer-contact a {
      color: rgba(255,255,255,.45);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,.2);
      transition: color .15s;
    }
    .footer-contact a:hover { color: rgba(255,255,255,.75); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="icon">⚓</div>
      <h1>FLEET DRY DOCK MANAGER</h1>

    </div>
    <div class="login-card">
      <h2>로그인</h2>
      <div class="error-msg" id="err-msg"></div>
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="username" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="login-btn" id="login-btn" onclick="doLogin()">로그인</button>
    </div>
    <div class="footer-txt">© 2026 손유석 감독 · Made by Youseok Son (Mr.)</div>
    <div class="footer-contact">
      <div>Contact: You Seok, Son (Mr.) · Technical Superintendent</div>
      <div><a href="mailto:ysson@sinokor.co.kr">ysson@sinokor.co.kr</a></div>
    </div>
  </div>
  <script>
    document.getElementById('password').addEventListener('keydown', e => {
      if(e.key === 'Enter') doLogin();
    });
    document.getElementById('username').addEventListener('keydown', e => {
      if(e.key === 'Enter') document.getElementById('password').focus();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('err-msg');

      if(!username || !password) {
        err.textContent = '아이디와 비밀번호를 입력하세요';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      err.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if(data.ok) {
          window.location.href = '/';
        } else {
          err.textContent = data.error || '로그인 실패';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '로그인';
        }
      } catch(e) {
        err.textContent = '서버 오류가 발생했습니다';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    }
  </script>
</body>
</html>
